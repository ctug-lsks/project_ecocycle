<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Dashboard</title>
        <link rel="stylesheet" href="css/green_dashboard.css">
        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>

    <body>
        <div class="dashboard">

            <!-- CARD 1 -->
            <div class="stat-card green">

                <div class="card-left">
                    <i class="fa-solid fa-recycle"></i>
                </div>

                <div class="card-center">
                    <div class="card-title">SỐ THIẾT BỊ TÁI CHẾ</div>
                    <div class="card-number">12</div>
                    <div class="card-desc">
                        Thiết bị bạn đã sửa chữa hoặc tái chế
                    </div>
                </div>

                <div class="card-right">
                    <div class="card-index">01</div>
                </div>

            </div>

            <!-- CARD 2 -->
            <div class="stat-card blue">

                <div class="card-left">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>

                <div class="card-center">
                    <div class="card-title">SỐ THIẾT BỊ ĐÃ MUA</div>
                    <div class="card-number">24</div>
                    <div class="card-desc">
                        Thiết bị đã mua và sử dụng lại
                    </div>
                </div>

                <div class="card-right">
                    <div class="card-index">02</div>
                </div>

            </div>

            <!-- CARD 3 -->
            <div class="stat-card yellow">

                <div class="card-left">
                    <i class="fa-solid fa-trash-can"></i>
                </div>

                <div class="card-center">
                    <div class="card-title">
                        LƯỢNG RÁC THẢI ĐIỆN TỬ ĐÃ XỬ LÝ 
                    </div>

                    <div class="card-number">
                        30 <span style="font-size:30px;">kg</span>
                    </div>

                    <div class="card-desc">
                        Rác thải điện tử bạn đã gửi đi xử lý 
                    </div>
                </div>

                <div class="card-right">
                    <div class="card-index">03</div>
                </div>

            </div>

            <!-- CARD 4 -->
            <div class="stat-card lightgreen">

                <div class="card-left">
                    <i class="fa-solid fa-cloud"></i>
                </div>

                <div class="card-center">
                    <div class="card-title">
                        LƯỢNG CO₂ GIẢM ĐƯỢC
                    </div>

                    <div class="card-number">
                        362
                        <span style="font-size:30px;">
                            kg CO₂e
                        </span>
                    </div>

                    <div class="card-desc">
                        Lượng khí thải CO₂ được giảm nhờ tái chế
                    </div>
                </div>

                <div class="card-right">
                    <div class="card-index">04</div>
                </div>

            </div>
        </div>
        <iframe src="footer.html" style="width:100%; height:500px; border:none;" scrolling="no"></iframe>
   <script src="js/data-loader.js"></script>
<script src="js/main.js"></script>

    </body>
</html>
