<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../css/admin.css">

        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <title>Sửa chữa & Tái chế</title>
    </head>
<body>

<div class="container">
    <div class="page-header">
        <div>
            <h1>Sửa chữa & Tái chế</h1>
            <p>
                Quản lý yêu cầu sửa chữa, mua lại và xử lý rác điện tử.
            </p>
        </div>

        <div class="page-actions">

            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="txtSearchOrder" placeholder="Tìm sản phẩm...">
            </div>
        </div>
    </div>

    <div class="repair-summary">
        <div class="summary-card">
            <i class="fa-solid fa-list-check"></i>
            <div>
                <h4>Tổng yêu cầu mua lại</h4>
                <span id="txtTotalRequest">512</span>
            </div>

        </div>

        <div class="summary-card">
            <i class="fa-solid fa-cart-shopping"></i>

            <div>
                <h4>Thiết bị đã mua lại</h4>
                <span id="txtBuyBack">158</span>
            </div>
        </div>

        <div class="summary-card">
            <i class="fa-solid fa-screwdriver-wrench"></i>

            <div>
                <h4>Thiết bị đã sửa</h4>
                <span id="txtRepair">246</span>
            </div>
        </div>

        <div class="summary-card">
            <i class="fa-solid fa-recycle"></i>
            <div>
                <h4>Rác điện tử đã xử lý</h4>
                <span id="txtRecycle">108</span>
            </div>
        </div>

    </div>

    <div class="table-card">

        <table>
            <thead>
                <tr>
                    <th>ID Sản phẩm</th>
                    <th>Sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>

            <tbody id="tblRepair">
                <tr><td colspan="4" style="text-align:center;padding:20px;">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>

</div>
<iframe src="footer.html" style="width:100%; height:380px; border:none; margin-top:50px;" scrolling="no"></iframe>
<script src="js/data-loader.js"></script>
<script src="js/main.js"></script>

</body>
</html>
