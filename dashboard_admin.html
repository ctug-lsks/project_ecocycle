<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="cards">

        <div class="card">
            <i class="fa-solid fa-bag-shopping"></i>

            <div>
                <h3>Bài đăng trên ECOcycle</h3>

                <span id="txtPost">8.765</span>
            </div>
        </div>

        <div class="card">
            <i class="fa-solid fa-coins"></i>

            <div>
                <h3>Thiết bị đã mua lại</h3>

                <span id="txtOrders">48.750</span>
            </div>
        </div>


        <div class="card">
            <i class="fa-solid fa-screwdriver-wrench"></i>

            <div>
                <h3>Thiết bị đã sửa</h3>

                <span id="txtRepair">1.935</span>
            </div>
        </div>

        <div class="card">
            <i class="fa-solid fa-coins"></i>

            <div>
                <h3>Rác điện tử đã xử lý</h3>

                <span id="txtRecycle">4.750</span>
            </div>
        </div>

    </div>

    <div class="section">

        <h2>Cần xử lý hôm nay</h2>

        <table>

            <tr>
                <th>Hạng mục</th>
                <th>Số lượng</th>
            </tr>

            <tr>
                <td>Bài đăng chờ duyệt</td>
                <td>12</td>
            </tr>

            <tr>
                <td>Khiếu nại cần xử lý</td>
                <td>8</td>
            </tr>
        </table>

    </div>

</div>
<iframe src="footer.html" style="width:100%; height:380px; border:none; margin-top:50px;" scrolling="no"></iframe>
<script src="js/data-loader.js"></script>
<script src="js/main.js"></script>

</body>
</html>
